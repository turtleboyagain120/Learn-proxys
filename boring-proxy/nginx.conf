events {
    worker_connections 1024;
}

http {
    server {
        listen 8080;
        location / {
            proxy_pass http://127.0.0.1:3128;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}

stream {
    server {
        listen 1080;
        proxy_pass 127.0.0.1:1081;
    }
}

