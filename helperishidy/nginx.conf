user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;

    keepalive_timeout 65;
    keepalive_requests 100;

    reset_timedout_connection on;
    client_max_body_size 50m;
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      '"$proxy_host" sn="$server_name" rt=$request_time upstream=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    include /etc/nginx/conf.d/*.conf;

    lua_package_path "/usr/local/openresty/lualib/?.lua;;";
    lua_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
    lua_ssl_verify_depth 5;

    # Fixed upstreams
    upstream cache_google {
        server cache.googleusercontent.com:443;
    }
    upstream cache_bing {
        server cc.bingj.com:443;
    }
    upstream archive_ph {
        server archive.ph:443;
    }
    upstream perplexity {
        server www.perplexity.ai:443;
    }

    server {
        listen 8080;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # Static files
        location / {
            try_files $uri $uri/ =404;
        }

        # Lua proxy endpoint (complete)
        location = /proxy {
            content_by_lua_block {
                local args = ngx.req.get_uri_args()
                local proxy_url = args["url"]
                if not proxy_url then
                    ngx.status = 400
                    ngx.say("Missing ?url= param")
                    return
                end

                ngx.req.read_body()

                -- Cache list (parallel-like sequential for Lua simplicity, timeout implicit)
                local caches = {
                    {host = "cache.googleusercontent.com", path_func = function(u) return "/search?q=cache:" .. u end},
                    {host = "webcache.googleusercontent.com", path_func = function(u) return "/search?q=cache:" .. u end},
                    {host = "cc.bingj.com", path_func = function(u) return "/cache.aspx?url=" .. u .. "&r=0" end},
                    {host = "archive.ph", path_func = function(u) return "/" .. u end},
                    {host = "www.perplexity.ai", path_func = function(u) return "/search?q=" .. u end}
                }

                local success = false
                local resp_body, resp_headers, resp_status

                for i, cache in ipairs(caches) do
                    local httpc = require "resty.http".new()
                    httpc:set_timeout(5000)  -- 5s per

                    local path = cache.path_func(proxy_url)
                    local url = "https://" .. cache.host .. path  -- HTTPS

                    local res, err = httpc:request_uri(url, {
                        method = "GET",
                        headers = {
                            ["User-Agent"] = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
                        }
                    })

                    if not err and res.status == 200 and #res.body > 1000 then
                        -- Simple rewrite (links/src to /proxy)
                        local body = res.body
                        body = ngx.re.gsub(body, [=[href=["']([^"']+)["']]=], 'href="/proxy?url=' .. ngx.escape_uri( proxy_url ) .. '"', 'io')
                        body = ngx.re.gsub(body, [=[src=["']([^"']+)["']]=], 'src="/proxy?url=' .. ngx.escape_uri( proxy_url ) .. '"', 'io')

                        resp_status = res.status
                        resp_headers = res.headers
                        resp_body = body
                        success = true
                        ngx.log(ngx.INFO, "Lua cache hit: " .. cache.host)
                        break
                    end
                end

                if not success then
                    ngx.status = 404
                    ngx.say("No cache found for " .. proxy_url)
                    return
                end

                -- Set headers (copy + proxy)
                for k, v in pairs(resp_headers) do
                    if type(v) == "table" then v = table.concat(v, ", ") end
                    if k:lower() ~= "content-encoding" and k:lower() ~= "transfer-encoding" then
                        ngx.header[k] = v
                    end
                end
                ngx.header["X-Proxy-By"] = "Helperishidy Nginx Lua"
                ngx.header["X-Port"] = "8080"

                ngx.status = resp_status
                ngx.say(resp_body)
            }
        }
    }
}

